<!DOCTYPE html>
<html lang="ta">
<head>
<style>
    body {
        background-color: #000; /* Dark Background */
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }
    .muzhakkam-text {
        font-family: 'Arial', sans-serif;
        font-size: 150px;
        font-weight: 900;
        fill: red;
        stroke: white; /* தடிமனான வெள்ளை பார்டர் */
        stroke-width: 8px; 
        paint-order: stroke;
        stroke-linejoin: round;
    }
    .ilaignar-text {
        font-size: 45px;
        fill: #0066FF;
        font-weight: bold;
    }
</style>
</head>
<body>

<svg width="1000" height="400" viewBox="0 0 1000 400" xmlns="http://www.w3.org/2000/svg">
    
    <!-- 1. பாரதியார் உருவம் (36164.jpg) -->
    <!-- உங்கள் கணினியில் உள்ள 36164.jpg கோப்பின் பாதையை 'href' இடத்தில் கொடுக்கவும் -->
    <image href="36164.jpg" x="20" y="20" width="120" height="120" />
    
    <!-- 2. "இளைஞர்" Text -->
    <text x="160" y="70" class="ilaignar-text">இளைஞர்</text>
    
    <!-- 3. Subtitle Text -->
    <text x="450" y="60" fill="white" font-size="22" font-family="Arial">ILAIGNAR MUZHAKKAM</text>
    <text x="950" y="60" fill="white" font-size="16" text-anchor="end" font-family="Arial">Volume: 15 Issue : 01</text>
    
    <!-- 4. Horizontal Line -->
    <line x1="160" y1="90" x2="950" y2="90" stroke="white" stroke-width="4" />
    
    <!-- 5. "முழக்கம்" (Red with Bold White Border) -->
    <text x="500" y="280" text-anchor="middle" class="muzhakkam-text">முழக்கம்</text>
    
    <!-- 6. Footer Text -->
    <text x="950" y="320" text-anchor="end" fill="white" font-size="28" font-family="Arial">நேர்படப் பேசு</text>
</svg>

</body>
</html>
